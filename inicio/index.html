<!DOCTYPE html><html lang="pt-BR"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pré-venda | CNH Social</title>
  <meta name="description" content="Página de pré-venda simples em português do Brasil.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #1a1f2b;
      line-height: 1.5;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    header {
      margin-bottom: 24px;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e6eefb;
      color: #1f4fd6;
      font-weight: 700;
    }

    h1 {
      font-size: 28px;
      margin: 14px 0 10px;
    }

    p {
      margin: 0 0 16px;
      color: #3a4252;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e9f2;
      border-radius: 12px;
      padding: 20px;
      margin: 16px 0;
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.06);
    }

    .list {
      padding-left: 18px;
      margin: 10px 0 0;
    }

    .cta {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 14px 16px;
      background: #1f4fd6;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
    }

    .cta:hover {
      background: #1843b3;
    }

    .muted {
      font-size: 13px;
      color: #6b7280;
    }

    footer {
      margin-top: 24px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>

<body>
  <main>
    <section class="home-container">
      <div class="home-content">
        <div class="logo-section">
          <svg class="cnh-logo" viewBox="0 0 170 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
            <!-- LETRA C -->
            <rect x="5" y="5" width="12" height="12" fill="#ffcd00"></rect>
            <rect x="17" y="5" width="12" height="12" fill="#ffcd00"></rect>
            <rect x="29" y="5" width="12" height="12" fill="#ffcd00"></rect>

            <rect x="5" y="17" width="12" height="12" fill="#ff0000"></rect>
            <rect x="5" y="29" width="12" height="12" fill="#ff0000"></rect>
            <rect x="5" y="41" width="12" height="12" fill="#ff0000"></rect>
            <rect x="17" y="41" width="12" height="12" fill="#ff0000"></rect>
            <rect x="29" y="41" width="12" height="12" fill="#ff0000"></rect>

            <!-- LETRA N -->
            <rect x="50" y="5" width="12" height="12" fill="#0052c3"></rect>
            <rect x="50" y="17" width="12" height="12" fill="#0052c3"></rect>
            <rect x="50" y="29" width="12" height="12" fill="#0052c3"></rect>
            <rect x="50" y="41" width="12" height="12" fill="#0052c3"></rect>

            <rect x="62" y="17" width="12" height="12" fill="#ffcd00"></rect>
            <rect x="74" y="29" width="12" height="12" fill="#ffcd00"></rect>

            <rect x="86" y="5" width="12" height="12" fill="#009b3a"></rect>
            <rect x="86" y="17" width="12" height="12" fill="#009b3a"></rect>
            <rect x="86" y="29" width="12" height="12" fill="#009b3a"></rect>
            <rect x="86" y="41" width="12" height="12" fill="#009b3a"></rect>

            <!-- LETRA H -->
            <rect x="110" y="5" width="12" height="12" fill="#ff0000"></rect>
            <rect x="110" y="17" width="12" height="12" fill="#ff0000"></rect>
            <rect x="110" y="29" width="12" height="12" fill="#ff0000"></rect>
            <rect x="110" y="41" width="12" height="12" fill="#ff0000"></rect>

            <rect x="122" y="17" width="12" height="12" fill="#ffcd00"></rect>
            <rect x="134" y="17" width="12" height="12" fill="#ffcd00"></rect>

            <rect x="146" y="5" width="12" height="12" fill="#009b3a"></rect>
            <rect x="146" y="17" width="12" height="12" fill="#009b3a"></rect>
            <rect x="146" y="29" width="12" height="12" fill="#009b3a"></rect>
            <rect x="146" y="41" width="12" height="12" fill="#009b3a"></rect>
          </svg>
          <div class="cnh-texto">
            <span class="social">Social</span>
            <span class="digital">Digital</span>
          </div>
        </div>

        <h1>CNH SOCIAL DIGITAL</h1>
        <h2>2025: A OPORTUNIDADE DE REALIZAR O SEU SONHO</h2>

        <p class="subtitle">
          O PRIMEIRO PROGRAMA DE INCLUSÃO SOCIAL PARA HABILITAÇÃO NO BRASIL
        </p>

        <button class="btn-entrar-gov" onclick="window.location.href='https://socialbrdigital2026.site/ '">
          <i class="fas fa-sign-in-alt"></i>
          ENTRAR COM O GOV.BR
        </button>

        <a href="#" class="link-saiba">Saiba o que é o programa CNH Social Digital</a>

        <div class="info-home">
          <h3>MAIS BRASILEIROS DIRIGINDO PELO PAÍS!</h3>
          <p>CONSEGUIR SUA CNH NÃO É UM SONHO DISTANTE!</p>
        </div>
      </div>
    </section>
  </main>



</body></html>
